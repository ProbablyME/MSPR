apiVersion: 1

datasources:
  # ── Loki : logs Python ETL ─────────────────────────────────────────────────
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: true
    version: 1
    editable: true

  # ── PostgreSQL : données métier + santé BDD ────────────────────────────────
  - name: PostgreSQL
    type: postgres
    access: proxy
    url: postgres:5432
    database: postgres
    user: postgres
    secureJsonData:
      password: lpironti
    jsonData:
      sslmode: disable
      postgresVersion: 1600
      timescaledb: false
    version: 1
    editable: true
