# ============================================================
# Pipeline CI/CD — ObRail Europe
#
# Déclenchement :
#   - Tous les pushs sur toutes les branches  → job "test" uniquement
#   - Push sur main                           → test + build + smoke-test
#   - Pull Request vers main                  → job "test" uniquement
#
# Séquence sur main  :
#   test ──► build-and-push ──► smoke-test
# ============================================================

name: Pipeline CI/CD

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write      

jobs:
  # ============================================================
  # JOB 1 — Tests unitaires (toutes les branches)
  # La DB est entièrement mockée → pas de PostgreSQL nécessaire
  # ============================================================
  test:
    name: Tests & Coverage ≥ 80%
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installer uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Configurer Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dépendances
        run: uv sync --all-packages --group dev

      - name: Lancer pytest avec coverage
        env:
          API_TOKEN: my-secret-token-123
        run: uv run pytest

      - name: Uploader le rapport de couverture HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 7

  # ============================================================
  # JOB 2 — Build Docker 
  # Exécuté uniquement sur main, après que les tests passent
  # ============================================================
  build-and-push:
    name: Build image Docker
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'   # uniquement sur main

    outputs:
      image: ${{ steps.image.outputs.name }}:sha-${{ github.sha }}

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Se connecter à ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ghcr.io exige des noms d'image entièrement en minuscules
      - name: Calculer le nom d'image en minuscules
        id: image
        run: |
          echo "name=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')/api" >> $GITHUB_OUTPUT

      # Le driver "docker" par défaut ne supporte pas le cache GHA.
      # setup-buildx bascule sur "docker-container" qui le supporte.
      - name: Configurer Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build et push l'image Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: api/Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:main
            ${{ steps.image.outputs.name }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================
  # JOB 3 — Smoke test (stack complète dans le runner GitHub)
  # Lance PostgreSQL + l'API, vérifie que tout répond
  # Exécuté uniquement sur main, après le build
  # ============================================================
  smoke-test:
    name: Smoke test (stack complète)
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    env:
      DB_USER: postgres
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      DB_NAME: postgres
      API_TOKEN: ${{ secrets.API_TOKEN }}
      API_IMAGE: ${{ needs.build-and-push.outputs.image }}

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Se connecter à ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Démarrer PostgreSQL + API
        run: docker compose -f docker-compose.ci.yml up -d postgres api

      - name: Attendre que l'API soit prête
        timeout-minutes: 2
        run: |
          until curl --silent --fail \
            -H "Authorization: Bearer ${{ secrets.API_TOKEN }}" \
            http://localhost:8000/api/v1/health; do
            sleep 5
          done

      - name: Vérifier endpoint racine
        run: |
          curl --fail \
            -H "Authorization: Bearer ${{ secrets.API_TOKEN }}" \
            http://localhost:8000/

      - name: Vérifier endpoint /stations
        run: |
          curl --fail \
            -H "Authorization: Bearer ${{ secrets.API_TOKEN }}" \
            "http://localhost:8000/api/v1/stations?per_page=1"

      - name: Vérifier que 401 est retourné sans token valide
        run: |
          STATUS=$(curl --silent -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer mauvais-token" \
            http://localhost:8000/api/v1/stations)
          [ "$STATUS" = "401" ] || (echo "Attendu 401, reçu $STATUS" && exit 1)

      - name: Logs en cas d'échec
        if: failure()
        run: docker compose -f docker-compose.ci.yml logs api

      - name: Arrêter la stack
        if: always()
        run: docker compose -f docker-compose.ci.yml down -v
